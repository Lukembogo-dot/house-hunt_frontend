name: Submit Feature for Admin Review

on:
  push:
    branches:
      - main # Important: Change this if your main branch is named differently

jobs:
  check-for-feature-review:
    # This job will only run if the commit message contains "@feature-review:"
    if: contains(github.event.head_commit.message, '@feature-review:')
    runs-on: ubuntu-latest

    steps:
      - name: 1. Get Commit Message
        # This step saves the full commit message into an environment variable
        run: echo "COMMIT_MSG<<EOF" >> $GITHUB_ENV; echo "${{ github.event.head_commit.message }}" >> $GITHUB_ENV; echo "EOF" >> $GITHUB_ENV

      - name: 2. Parse Feature Details from Commit
        id: parse
        run: |
          # Use grep/cut/sed to safely extract and trim whitespace
          KEY_RAW=$(echo "${{ env.COMMIT_MSG }}" | grep '@feature-key:' | cut -d':' -f2- | sed 's/^[ \t]*//;s/[ \t]*$//')
          DESC_RAW=$(echo "${{ env.COMMIT_MSG }}" | grep '@feature-desc:' | cut -d':' -f2- | sed 's/^[ \t]*//;s/[ \t]*$//')

          echo "key=$KEY_RAW" >> $GITHUB_OUTPUT
          echo "desc=$DESC_RAW" >> $GITHUB_OUTPUT

      - name: 3. Call API using Node.js
        if: steps.parse.outputs.key && steps.parse.outputs.desc
        env:
          # Pass secrets and parsed data into the script's environment
          API_URL: ${{ secrets.API_URL }}
          API_KEY: ${{ secrets.SERVICE_API_KEY }}
          FEATURE_KEY_RAW: ${{ steps.parse.outputs.key }}
          FEATURE_DESC: ${{ steps.parse.outputs.desc }}
        run: |
          # 1. Sanitize the key using the same sed command (this part was working)
          KEY=$(echo "$FEATURE_KEY_RAW" | tr '[:upper:]' '[:lower:]' | sed -E -e 's/[^a-z0-9]+/-/g' -e 's/^-|-$//g')
          echo "Sanitized Key: $KEY"

          # 2. Run the Node.js script
          # This script uses built-in 'https' module, so no 'npm install' is needed.
          node -e "
            const https = require('https');
            
            // Build the payload
            const data = JSON.stringify({
              featureKey: '$KEY', // Use the sanitized key
              description: process.env.FEATURE_DESC
            });
            
            // Parse the API URL
            const url = new URL(process.env.API_URL + '/api/service/submit-update');
            
            // Configure the request
            const options = {
              hostname: url.hostname,
              path: url.pathname,
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Content-Length': Buffer.byteLength(data),
                'x-api-key': process.env.API_KEY
              }
            };
            
            // Make the request
            const req = https.request(options, (res) => {
              console.log('API StatusCode:', res.statusCode);
              
              // If status code is not 200 or 201, fail the action
              if (res.statusCode < 200 || res.statusCode > 299) {
                console.error('API call failed with status:', res.statusCode);
                process.exit(1); 
              }
              
              res.on('data', (d) => process.stdout.write(d));
            });
            
            req.on('error', (e) => {
              console.error('Request Error:', e);
              process.exit(1); // Fail the action on error
            });
            
            // Send the data
            req.write(data);
            req.end();
          "
