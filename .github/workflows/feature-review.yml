name: Submit Feature for Admin Review

# This action runs on every push to the 'main' branch
on:
  push:
    branches:
      - main # Important: Change this if your main branch is named differently

jobs:
  check-for-feature-review:
    # This job will only run if the commit message contains "@feature-review:"
    if: contains(github.event.head_commit.message, '@feature-review:')
    runs-on: ubuntu-latest

    steps:
      - name: 1. Get Commit Message
        # This step saves the full commit message into an environment variable
        run: echo "COMMIT_MSG<<EOF" >> $GITHUB_ENV; echo "${{ github.event.head_commit.message }}" >> $GITHUB_ENV; echo "EOF" >> $GITHUB_ENV

      - name: 2. Parse Feature Details from Commit
        id: parse
        run: |
          # This script finds the lines starting with @feature-key: and @feature-desc:
          # It cleans them up and saves them as output variables for the next step
          KEY=$(echo "${{ env.COMMIT_MSG }}" | grep '@feature-key:' | cut -d':' -f2- | xargs)
          DESC=$(echo "${{ env.COMMIT_MSG }}" | grep '@feature-desc:' | cut -d':' -f2- | xargs)

          echo "key=$KEY" >> $GITHUB_OUTPUT
          echo "desc=$DESC" >> $GITHUB_OUTPUT

      - name: 3. Call Feature Approval API
        # This step only runs if both a key and description were successfully parsed
        if: steps.parse.outputs.key && steps.parse.outputs.desc
        run: |
          echo "Submitting feature to API..."
          curl -X POST "${{ secrets.API_URL }}/api/service/submit-update" \
          -H "Content-Type: application/json" \
          -H "x-api-key: ${{ secrets.SERVICE_API_KEY }}" \
          -d '{
                "featureKey": "${{ steps.parse.outputs.key }}",
                "description": "${{ steps.parse.outputs.desc }}"
              }'
